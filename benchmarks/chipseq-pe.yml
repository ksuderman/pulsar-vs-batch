# ChIP-seq PE benchmark using IWC test data (wt_H3K4me3, mm10)
# Workflow: https://iwc.galaxyproject.org/workflow/chipseq-pe-main/
#
# Test data from Zenodo (record 1324070):
#   Forward: https://zenodo.org/record/1324070/files/wt_H3K4me3_read1.fastq.gz
#   Reverse: https://zenodo.org/record/1324070/files/wt_H3K4me3_read2.fastq.gz
#
# Upload the paired FASTQs to your Galaxy instance and create a list:paired
# collection named "wt_H3K4me3" before running this benchmark.
- output_history_base_name: ChIPseq-PE
  workflow_id: "ChIP-seq Analysis: Paired-End Read Processing"
  runs:
  - history_name: 2GB
    inputs:
    - name: PE fastq input
      collection: chipseq-2g
    - name: Reference genome
      value: hg38
    - name: Effective genome size
      value: 2913022398
    - name: Normalize profile
      value: true
  - history_name: 5GB
    inputs:
    - name: PE fastq input
      collection: chipseq-5g
    - name: Reference genome
      value: hg38
    - name: Effective genome size
      value: 2913022398
    - name: Normalize profile
      value: true
  - history_name: 10GB
    inputs:
    - name: PE fastq input
      collection: chipseq-10g
    - name: Reference genome
      value: hg38
    - name: Effective genome size
      value: 2913022398
    - name: Normalize profile
      value: true